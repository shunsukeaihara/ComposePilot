name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          APP_NAME: composepilot
        run: |
          set -eux
          VERSION="${VERSION#v}"
          mkdir -p dist package
          BIN_NAME="${APP_NAME}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${BIN_NAME}" ./cmd/composepilot
          ARCHIVE_BASE="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            cd dist
            zip "../package/${ARCHIVE_BASE}.zip" "${BIN_NAME}"
          else
            tar -C dist -czf "package/${ARCHIVE_BASE}.tar.gz" "${BIN_NAME}"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: package/*
